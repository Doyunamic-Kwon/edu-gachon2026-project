name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'projects/team07-sequel/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 인증
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: 백엔드 URL 조회
        id: backend_url
        run: |
          URL=$(gcloud run services describe text2sql-backend \
            --region=asia-northeast3 \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: 이미지 빌드 & push
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ steps.backend_url.outputs.url }} \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/frontend:${{ github.sha }} \
            projects/team07-sequel/frontend
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/frontend:${{ github.sha }}

      - name: Cloud Run 배포
        run: |
          gcloud run deploy text2sql-frontend \
            --image=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/frontend:${{ github.sha }} \
            --region=asia-northeast3 \
            --allow-unauthenticated
